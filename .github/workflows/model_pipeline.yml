name: Capstone MLOps Project - Engine Condition Prediction Workflow pipeline

on:
  push:
    branches:
      - main  # Automatically triggers on push to the main branch

jobs:

  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Installing Dependencies
        run: pip install -r Capstone_Project_PM/requirements.txt
      - name: Upload Dataset to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Capstone_Project_PM/model_building/data_register.py

  data-preprocessing:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Installing Dependencies
        run: pip install -r Capstone_Project_PM/requirements.txt
      - name: Data Preprocessing
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Capstone_Project_PM/model_building/data_prep.py

  model-training:
    needs: data-preprocessing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Installing Dependencies
        run: pip install -r Capstone_Project_PM/requirements.txt
      - name: Start MLflow Server
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 5000 &  # Run MLflow UI in the background
          sleep 5  # Wait for a moment to let the server starts
      - name: Model Building
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Capstone_Project_PM/model_building/train.py

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-training, data-preprocessing, register-dataset]
    steps:
      - uses: actions/checkout@v3
      - name: Installing Dependencies
        run: pip install -r Capstone_Project_PM/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python Capstone_Project_PM/hosting/hosting.py
